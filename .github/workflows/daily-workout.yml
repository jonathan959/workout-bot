name: Daily Workout

on:
  workflow_dispatch:

jobs:
  send-workout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: npm install
      - name: Show commit (verify latest code)
        run: git rev-parse HEAD && sed -n '1,35p' src/gemini-api.js || true
      - run: node src/generate-workout.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optional repo variable: Settings → Secrets and variables → Actions → Variables
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      - name: Commit workout history
        run: |
          git config user.name "Workout Bot"
          git config user.email "bot@workoutbot.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "Log workout $(date +%Y-%m-%d)"
          git push
