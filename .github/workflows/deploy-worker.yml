# Deploy Cloudflare Worker (workers.dev / custom routes).
#
# Repo secret required: CLOUDFLARE_API_TOKEN — create at:
# https://dash.cloudflare.com/profile/api-tokens
# Permissions: Edit Cloudflare Workers (and include the account/resources you use).
#
# Optionally enable "Read and write GitHub Secrets" workflow permissions if you add Workers secrets via API later.

name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "config/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN secret not set — skipping Worker deploy."
            exit 0
          fi
          npx wrangler deploy
